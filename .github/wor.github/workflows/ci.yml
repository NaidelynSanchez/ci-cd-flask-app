name: CI - Flask App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flask

    - name: Ejecutar tests
      run: |
        python -m unittest discover -v

  docker:
    runs-on: ubuntu-latest
    needs: test   # 👈 esto hace que primero corran los tests

    steps:
    - name: Clonar repo
      uses: actions/checkout@v3

    - name: Build Docker
      run: docker build -t mi-app .
